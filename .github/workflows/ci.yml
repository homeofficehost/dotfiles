name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  validate:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Ansible
      run: brew install ansible ansible-lint

    - name: Validate playbooks (syntax + lint)
      run: |
        for f in local.yml site.yml; do
          [ -f "$f" ] && ansible-playbook "$f" --syntax-check
        done
        ansible-lint roles/

    - name: Validate Brewfile
      run: brew bundle check --verbose 2>&1 || true

    - name: Dry run ansible-playbook
      run: ansible-playbook -c local local.yml --check --diff 2>&1 || true

    - name: Upload report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ci-report
        path: |
          ansible.cfg
          local.yml
          site.yml
          hosts
          Brewfile
        retention-days: 30
