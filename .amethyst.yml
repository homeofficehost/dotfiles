# Amethyst configuration
# Hyprland-style: Super + arrows = focus, Super + Shift + arrows = throw

mouse-follows-focus: false
focus-follows-mouse: false
mouse-swaps-windows: false
mouse-resizes-windows: false

# Focus window with Super + Arrow keys
focus-ccw:
  mod: command
  key: left

focus-cw:
  mod: command
  key: right

focus-up:
  mod: command
  key: up

focus-down:
  mod: command
  key: down

# Throw window to workspace with Super + Shift + Arrow
throw-space-left:
  mod: "command+shift"
  key: left

throw-space-right:
  mod: "command+shift"
  key: right

throw-space-up:
  mod: "command+shift"
  key: up

throw-space-down:
  mod: "command+shift"
  key: down

# Additional useful shortcuts
cycle-layout:
  mod: command
  key: j

cycle-layout-backward:
  mod: command
  key: k

toggle-float:
  mod: command
  key: space

relaunch-amethyst:
  mod: command
  key: r
